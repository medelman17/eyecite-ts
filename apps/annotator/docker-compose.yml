services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: annotator
      POSTGRES_PASSWORD: annotator
      POSTGRES_DB: annotator
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annotator"]
      interval: 2s
      timeout: 3s
      retries: 20
